services:
  # Person 2: Spring Boot API Gateway
  gateway-service:
    build:
      context: ../../gateway_service
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - '8080:8080'
    volumes:
      - ../init-scripts:/app/init-scripts
    environment:
      # - SPRING_PROFILES_ACTIVE=prod
      # 🔗 Task #1: set DB_HOST/DB_NAME/DB_USERNAME/DB_PASSWORD in your own
      # .env (gitignored — never commit real values here). Points at Neon
      # during local dev, or at RDS after `terraform apply` +
      # infrastructure/scripts/migrate_neon_to_rds.sh with no other changes.
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST:?set DB_HOST in .env}:5432/${DB_NAME:?set DB_NAME in .env}?sslmode=require
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:?set DB_USERNAME in .env}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:?set DB_PASSWORD in .env}
      # Task #1 dual-DB: when BACKUP_DB_URL is set (the Neon JDBC URL), the
      # gateway routes reads/writes to the primary above and fails over to
      # Neon when it is down, while BackupSyncService mirrors every table
      # into Neon so both databases store the uploaded data. Leave empty for
      # single-DB mode.
      - BACKUP_DB_URL=${BACKUP_DB_URL:-}
      - BACKUP_DB_USER=${BACKUP_DB_USER:-}
      - BACKUP_DB_PASSWORD=${BACKUP_DB_PASSWORD:-}
      - SPRING_SQL_INIT_MODE=always
      - S3_BUCKET=private-credit-ingestion-dev-storage
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - CLASSIFY_BASE_URL=http://classification-service:8000
      - INTERNAL_JWT_SECRET=platform-internal-jwt-signing-secret
      - SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE=500MB
      - SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE=500MB
      - SPRING_DATA_REDIS_HOST=gateway-cache
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      # Task #2 Part 3: X-Ray daemon relays segments from the SDK (wired in
      # GatewayApplication) to the real AWS X-Ray service for the service map.
      - AWS_XRAY_DAEMON_ADDRESS=xray-daemon:2000
    depends_on:
      - xray-daemon
    networks:
      - ingress-network
      - secure-backend-net

  # Person 3: FastAPI Classification & Ingestion Engine
  classification-service:
    build:
      context: ../../classification-service
      dockerfile: Dockerfile
    container_name: classification-service
    ports:
      - '8000:8000'
    tmpfs:
      - /tmp:size=2G,mode=1777
    depends_on:
      - gateway-service
    environment:
      - DATABASE_URL=${DATABASE_URL}
      # Task #1 dual-DB: Neon fallback while the primary above is unreachable.
      - BACKUP_DATABASE_URL=${BACKUP_DATABASE_URL:-}
      - AWS_S3_BUCKET_NAME=private-credit-ingestion-dev-storage
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - INTERNAL_JWT_SECRET=platform-internal-jwt-signing-secret
      - JWT_ALGORITHM=HS256
      # 🔗 Story 1.2 — Person 1 LLM (Google Gemini, free tier)
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # 🔗 Story 1.2 — Person 2 webhook callback to Spring Boot gateway
      - GATEWAY_CALLBACK_URL=http://gateway-service:8080/webhooks/classification-complete
      # 🔗 Story 1.3 — Person 2 extraction-failure event to Spring Boot gateway
      - GATEWAY_EXTRACTION_EVENT_URL=http://gateway-service:8080/webhooks/extraction-failed
    networks:
      - secure-backend-net

  # Person 1: React Frontend UI
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: frontend-ui
    ports:
      - '3000:80'
    # No build-time env vars: the bundled JS calls /uploads relatively, and
    # nginx (see frontend/nginx.conf) reverse-proxies that path to
    # gateway-service:8080 over the ingestion-network.
    depends_on:
      - gateway-service
    networks:
      - ingress-network

  gateway-cache:
    image: redis:7.2-alpine
    container_name: ddac-gateway-cache
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - cache_data:/data
    networks:
      - secure-backend-net

  # Task #2 Part 3: relays X-Ray segments emitted by the gateway's SDK
  # instrumentation to the real AWS X-Ray API so the service map is
  # populated. Same container works unchanged whether run locally or on
  # the EC2 host from ec2_deployment.tf.
  xray-daemon:
    image: amazon/aws-xray-daemon:latest
    container_name: xray-daemon
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    command: -o
    ports:
      - '2000:2000/udp'
    networks:
      - secure-backend-net

volumes:
  cache_data:

networks:
  ingress-network:
    driver: bridge
  secure-backend-net:
    driver: bridge
