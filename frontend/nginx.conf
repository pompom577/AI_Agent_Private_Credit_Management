server {
    listen 80;
    server_name _;

    # Allow large ZIP uploads (mirrors gateway's 500MB cap).
    client_max_body_size 500M;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the upload endpoint to the gateway service on the
    # internal Docker network. Keeps the browser on a single origin
    # (no CORS) and avoids hard-coding host:port in the JS bundle.
    location /uploads {
        proxy_pass http://gateway-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming upload + long-running classify handoff.
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Story 2.2a: PDF byte-stream from the document storage endpoint.
    location /documents {
        proxy_pass http://gateway-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stream bytes through without buffering; 2-second SLA enforced at gateway.
        proxy_buffering off;
        proxy_read_timeout 10s;
    }

    # Story 2.2a: Lineage metadata API.
    location /api {
        proxy_pass http://gateway-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 10s;
    }

    # Story 1.3: reverse-proxy the gateway's Server-Sent Events stream. Buffering
    # must be OFF so each extraction-failure event is flushed to the browser
    # immediately rather than held back by nginx.
    location /sse {
        proxy_pass http://gateway-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
