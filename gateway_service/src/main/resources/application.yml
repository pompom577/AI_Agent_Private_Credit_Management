server:
  port: 8080

spring:
  application:
    name: gateway-service
  datasource:
    url: jdbc:postgresql://${DB_ENDPOINT:localhost}:5432/private_credit_db
    username: ${DB_USER:platform_admin}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB

gateway:
  upload:
    max-size-bytes: 524288000 # 500 MB hard cap mirrored on the backend
  storage:
    bucket: ${S3_BUCKET:private-credit-ingestion-dev-storage}
    region: ${AWS_REGION:us-east-1}
  classification:
    base-url: ${CLASSIFY_BASE_URL:http://classification-service:8000}
  webhook:
    gateway-base-url: ${GATEWAY_BASE_URL:http://gateway-service:8080}
  jwt:
    secret: ${INTERNAL_JWT_SECRET:change-me-internal-jwt-secret-min-32-chars-long}
    ttl-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.platform.gateway: DEBUG
    com.platform.gateway.services.JwtService: DEBUG
